  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  google_mlkit_text_recognition: ^0.15.1
  razorpay_flutter: ^1.4.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
