  google_maps_flutter: ^2.5.3
  geocoding: ^3.0.0
  google_places_flutter: ^2.0.7
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.3
  animate_do: ^3.1.2
  shake: ^3.0.0
  flutter_background_service: ^5.0.10
  device_info_plus: ^12.3.0
