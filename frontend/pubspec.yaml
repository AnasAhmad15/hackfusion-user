version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  sensors_plus: ^6.1.1
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
